services:
  - type: web
    name: golf-majors-2026
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        value: file:/data/golf.db
      - key: NODE_ENV
        value: production
    disk:
      name: golf-data
      mountPath: /data
      sizeGB: 1
